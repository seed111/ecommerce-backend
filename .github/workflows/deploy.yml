name: Deploy

on:
  push:
    branches: [main]

env:
  AWS_REGION: eu-west-1
  ECR_REPOSITORY: dev/ecommerce-api
  EKS_CLUSTER_NAME: dev-ecommerce-eks
  HELM_RELEASE: ecommerce
  HELM_NAMESPACE: ecommerce

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
      ecr_registry: ${{ steps.login-ecr.outputs.registry }}
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      - id: meta
        run: echo "tag=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT
      - uses: docker/build-push-action@v5
        with:
          context: ./app
          file: ./app/Dockerfile
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.meta.outputs.tag }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r app/requirements.txt pytest pytest-asyncio httpx moto
      - run: pytest app/tests/ -v
        env:
          ENV: test
          AWS_DEFAULT_REGION: eu-west-1
          PRODUCTS_TABLE_NAME: test-products
          ORDERS_TABLE_NAME: test-orders
          USERS_TABLE_NAME: test-users
          S3_BUCKET_NAME: test-bucket

  deploy:
    runs-on: ubuntu-latest
    needs: [build, test]
    environment: dev
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - run: aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.EKS_CLUSTER_NAME }}
      - uses: azure/setup-helm@v3
        with:
          version: "3.14.0"
      - run: kubectl create namespace ${{ env.HELM_NAMESPACE }} --dry-run=client -o yaml | kubectl apply -f -
      - id: tf-outputs
        run: |
          cd terraform/environments/dev
          terraform init -backend-config="bucket=ecommerce-terraform-state-dev" \
                         -backend-config="key=dev/terraform.tfstate" \
                         -backend-config="region=${{ env.AWS_REGION }}"
          echo "irsa_role_arn=$(terraform output -raw app_irsa_role_arn)" >> $GITHUB_OUTPUT
          echo "s3_bucket=$(terraform output -raw s3_bucket_name)" >> $GITHUB_OUTPUT
      - run: |
          helm upgrade --install ${{ env.HELM_RELEASE }} ./helm/ecommerce \
            --namespace ${{ env.HELM_NAMESPACE }} \
            --set image.repository=${{ needs.build.outputs.ecr_registry }}/${{ env.ECR_REPOSITORY }} \
            --set image.tag=${{ needs.build.outputs.image_tag }} \
            --set serviceAccount.annotations."eks\.amazonaws\.com/role-arn"=${{ steps.tf-outputs.outputs.irsa_role_arn }} \
            --set env.S3_BUCKET_NAME=${{ steps.tf-outputs.outputs.s3_bucket }} \
            --atomic --timeout 5m --wait
      - run: kubectl rollout status deployment/ecommerce-api --namespace ${{ env.HELM_NAMESPACE }} --timeout=3m