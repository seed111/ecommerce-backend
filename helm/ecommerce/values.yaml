replicaCount: 2

image:
  repository: ""
  tag: "latest"
  pullPolicy: IfNotPresent

serviceAccount:
  create: true
  name: "ecommerce-api"
  annotations:
    eks.amazonaws.com/role-arn: ""

service:
  type: ClusterIP
  port: 80
  targetPort: 8000

resources:
  requests:
    cpu: "250m"
    memory: "256Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70

env:
  ENV: "dev"
  AWS_REGION: "eu-west-1"
  PRODUCTS_TABLE_NAME: "dev-products"
  ORDERS_TABLE_NAME: "dev-orders"
  USERS_TABLE_NAME: "dev-users"
  S3_BUCKET_NAME: ""

livenessProbe:
  httpGet:
    path: /healthz
    port: 8000
  initialDelaySeconds: 10
  periodSeconds: 15

readinessProbe:
  httpGet:
    path: /readyz
    port: 8000
  initialDelaySeconds: 10
  periodSeconds: 10
  failureThreshold: 3